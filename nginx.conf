server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;      

    # ────────────────────────────────────────────
    # 1. Mandatory MIME type for PWA manifest
    # ────────────────────────────────────────────
    types {
        application/manifest+json       manifest;
        application/json                json;
    }

    # ────────────────────────────────────────────
    # 2. Service Worker & related files must not be cached
    # ────────────────────────────────────────────
    location = /service-worker.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
}

    location ~* (workbox|sw|service-worker).*\.js$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri =404;
}

    # ────────────────────────────────────────────
    # 3. HTML / JSON / XML → never cached (app shell must always update)
    # ────────────────────────────────────────────
    location ~* \.(?:html?|json|xml)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ────────────────────────────────────────────
    # 4. Static assets (fingerprinted) → cache long-term
    # ────────────────────────────────────────────
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }


    # ────────────────────────────────────────────
    # 5. Any route containing a file extension → block if missing
    # ────────────────────────────────────────────
    location ~ ^.+\..+$ {
        try_files $uri =404;
    }

    # ────────────────────────────────────────────
    # 6. SPA fallback → return index.html for unknown routes
    # ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}