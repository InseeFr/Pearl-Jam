name: Early Docker image publishing

on:
  push:
    branches-ignore:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pearl-jam
          path: dist

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/') &&
        github.ref != 'refs/heads/main' &&
        github.ref != 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pearl-jam
          path: dist

      - name: Debug runner filesystem
        run: |
          ls -al .
          echo "Listing root /"
          ls -al /
          echo "Listing repository checkout directory"
          ls -al $GITHUB_WORKSPACE
          echo "Listing dist artifact folder"
          ls -al dist

      - name: Read project version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: '.'
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            inseefr/pearl-jam:${{ github.ref_name }}-${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max