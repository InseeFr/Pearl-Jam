map $uri $csp_policy {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
}

server {
    listen 8300 default_server;
    server_name /usr/share/nginx/html;
    root /usr/share/nginx/html;
    index index.html;
    
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
      expires -1;
      add_header Content-Security-Policy $csp_policy always;
    }
    
    location ~* \.(?:css|js)$ {
      try_files $uri =404;
      expires 1y;
      access_log off;
      add_header Cache-Control "public";
      add_header Content-Security-Policy $csp_policy always;
    }
    
    location ~ ^.+\..+$ {
      try_files $uri =404;
      add_header Content-Security-Policy $csp_policy always;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy $csp_policy always;
    }
}